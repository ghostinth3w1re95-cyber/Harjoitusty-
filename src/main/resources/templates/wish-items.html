<!DOCTYPE html>
<html lang="fi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Toivelista</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{nav :: topnav}"></div>
<main class="page grid two">
    <section class="card">
        <h2>Toivelistan tuote</h2>
        <form th:action="@{/wish-items}" th:object="${wishItem}" method="post">
            <input type="hidden" th:field="*{id}">
            <label>Tuote</label>
            <input th:field="*{itemName}" type="text">
            <small class="error" th:errors="*{itemName}"></small>
            <label>Tavoitehinta</label>
            <input th:field="*{targetPrice}" type="number" step="0.01">
            <label>Tila</label>
            <select th:field="*{status}">
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
            </select>
            <button class="button" type="submit">Tallenna</button>
        </form>
    </section>
    <section class="card">
        <h2>Tuotteet</h2>
        <div class="table-row" th:each="item : ${wishItems}">
            <div>
                <strong th:text="${item.itemName}">Tuote</strong>
                <p th:text="${item.status + ' | ' + item.targetPrice + ' EUR'}">Rivi</p>
            </div>
            <div class="actions">
                <a th:href="@{'/wish-items/' + ${item.id} + '/edit'}">Muokkaa</a>
                <form method="post" th:action="@{'/wish-items/' + ${item.id} + '/delete'}">
                    <button class="link-button" type="submit">Poista</button>
                </form>
            </div>
        </div>
    </section>
</main>
</body>
</html>
