<!DOCTYPE html>
<html lang="fi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kulut</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{nav :: topnav}"></div>
<main class="page grid two">
    <section class="card">
        <h2>Kulu</h2>
        <form th:action="@{/expenses}" th:object="${expense}" method="post">
            <input type="hidden" th:field="*{id}">
            <label>Otsikko</label>
            <input th:field="*{title}" type="text">
            <small class="error" th:errors="*{title}"></small>
            <label>Summa</label>
            <input th:field="*{amount}" type="number" step="0.01">
            <small class="error" th:errors="*{amount}"></small>
            <label>Päivämäärä</label>
            <input th:field="*{expenseDate}" type="date">
            <small class="error" th:errors="*{expenseDate}"></small>
            <label>Kategoria</label>
            <a th:href="@{/categories}">Lisää uusi kategoria</a>
            <select name="categoryId">
                <option value="">Valitse kategoria</option>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"
                        th:selected="${expense.category != null and expense.category.id == category.id}"></option>
            </select>
            <small class="error" th:errors="*{category}"></small>
            <label>Muistiinpanot</label>
            <textarea th:field="*{notes}"></textarea>
            <button class="button" type="submit">Tallenna</button>
        </form>
    </section>
    <section class="card">
        <h2>Kululista</h2>
        <div class="table-row" th:each="item : ${expenses}">
            <div>
                <strong th:text="${item.title}">Otsikko</strong>
                <p th:text="${item.expenseDate + ' | ' + item.amount + ' EUR | ' + item.category.name}">Rivi</p>
            </div>
            <div class="actions">
                <a th:href="@{'/expenses/' + ${item.id} + '/edit'}">Muokkaa</a>
                <form method="post" th:action="@{'/expenses/' + ${item.id} + '/delete'}">
                    <button class="link-button" type="submit">Poista</button>
                </form>
            </div>
        </div>
    </section>
</main>
</body>
</html>
